name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install --ignore-scripts

    - name: Build frontend
      run: |
        echo "Building frontend..."
        npm run build
        echo "Frontend build completed"
        ls -la dist/

    - name: Build Electron app
      run: |
        echo "Building Electron app..."
        echo "Node.js version: $(node -v)"
        echo "npm version: $(npm -v)"
        npm run electron:build -- --win --mac --linux --verbose
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: List dist-electron directory
      run: |
        echo "Listing dist-electron directory..."
        ls -la dist-electron/
        if [ -d "dist-electron/win-unpacked" ]; then
          echo "Listing win-unpacked directory..."
          ls -la dist-electron/win-unpacked/
        fi
        if [ -d "dist-electron/linux-unpacked" ]; then
          echo "Listing linux-unpacked directory..."
          ls -la dist-electron/linux-unpacked/
        fi
        if [ -d "dist-electron/mac" ]; then
          echo "Listing mac directory..."
          ls -la dist-electron/mac/
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: box-attack-builds
        path: dist-electron/*

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: box-attack-builds
        path: dist-electron

    - name: List downloaded artifacts
      run: ls -la dist-electron/

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Windows Portable EXE
      run: |
        if [ -f "dist-electron/BoxAttack.exe" ]; then
          echo "Uploading BoxAttack.exe..."
          curl -X POST "${{ steps.create_release.outputs.upload_url }}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            -F "asset=@dist-electron/BoxAttack.exe" \
            -F "name=BoxAttack.exe"
        else
          echo "BoxAttack.exe not found, skipping..."
        fi

    - name: Upload Windows Installer
      run: |
        if [ -f "dist-electron/盒打击 Setup 0.0.0.exe" ]; then
          echo "Uploading 盒打击 Setup 0.0.0.exe..."
          curl -X POST "${{ steps.create_release.outputs.upload_url }}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            -F "asset=@dist-electron/盒打击 Setup 0.0.0.exe" \
            -F "name=BoxAttack-Setup.exe"
        else
          echo "盒打击 Setup 0.0.0.exe not found, skipping..."
        fi

    - name: Upload Linux AppImage
      run: |
        if [ -f "dist-electron/盒打击-0.0.0.AppImage" ]; then
          echo "Uploading 盒打击-0.0.0.AppImage..."
          curl -X POST "${{ steps.create_release.outputs.upload_url }}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            -F "asset=@dist-electron/盒打击-0.0.0.AppImage" \
            -F "name=BoxAttack.AppImage"
        else
          echo "盒打击-0.0.0.AppImage not found, skipping..."
        fi

    - name: Upload macOS DMG
      run: |
        if [ -f "dist-electron/盒打击-0.0.0.dmg" ]; then
          echo "Uploading 盒打击-0.0.0.dmg..."
          curl -X POST "${{ steps.create_release.outputs.upload_url }}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            -F "asset=@dist-electron/盒打击-0.0.0.dmg" \
            -F "name=BoxAttack.dmg"
        else
          echo "盒打击-0.0.0.dmg not found, skipping..."
        fi
