name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: |
        echo "Installing dependencies..."
        npm install --verbose
        echo "Dependencies installed successfully"

    - name: Build frontend
      run: |
        echo "Building frontend..."
        npm run build
        echo "Frontend built successfully"
        dir dist\

    - name: Build Electron app (Windows only)
      run: |
        echo "Building Electron app..."
        npm run electron:build -- --win --verbose
        echo "Electron app built successfully"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: List dist-electron directory
      run: |
        echo "Listing dist-electron directory..."
        dir dist-electron\
        if (Test-Path "dist-electron\win-unpacked") {
          echo "Listing win-unpacked directory..."
          dir dist-electron\win-unpacked\
        }

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: box-attack-windows
        path: dist-electron/*

  release:
    needs: build
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: box-attack-windows
        path: dist-electron

    - name: List downloaded artifacts
      run: |
        echo "Listing downloaded artifacts..."
        dir dist-electron\
        if (Test-Path "dist-electron\win-unpacked") {
          echo "Listing win-unpacked directory..."
          dir dist-electron\win-unpacked\
        }

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Windows Setup
      if: Test-Path "dist-electron\BoxAttack Setup 0.0.0.exe"
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist-electron\BoxAttack Setup 0.0.0.exe
        asset_name: BoxAttack-Setup.exe
        asset_content_type: application/octet-stream

    - name: Upload Windows Portable
      if: Test-Path "dist-electron\win-unpacked\BoxAttack.exe"
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist-electron\win-unpacked\BoxAttack.exe
        asset_name: BoxAttack.exe
        asset_content_type: application/octet-stream
