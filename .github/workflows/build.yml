name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install --ignore-scripts

    - name: Build frontend
      run: npm run build

    - name: Build Electron app
      run: npm run electron:build -- --win --mac --linux
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: List dist-electron directory
      run: ls -la dist-electron/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: box-attack-builds
        path: dist-electron/*

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: box-attack-builds
        path: dist-electron

    - name: List downloaded artifacts
      run: ls -la dist-electron/

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Windows Portable EXE
      if: exists('dist-electron/BoxAttack.exe')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist-electron/BoxAttack.exe
        asset_name: BoxAttack.exe
        asset_content_type: application/octet-stream

    - name: Upload Windows Installer
      if: exists('dist-electron/盒打击 Setup 0.0.0.exe')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist-electron/盒打击 Setup 0.0.0.exe
        asset_name: BoxAttack-Setup.exe
        asset_content_type: application/octet-stream

    - name: Upload Linux AppImage
      if: exists('dist-electron/盒打击-0.0.0.AppImage')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist-electron/盒打击-0.0.0.AppImage
        asset_name: BoxAttack.AppImage
        asset_content_type: application/octet-stream

    - name: Upload macOS DMG
      if: exists('dist-electron/盒打击-0.0.0.dmg')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist-electron/盒打击-0.0.0.dmg
        asset_name: BoxAttack.dmg
        asset_content_type: application/octet-stream
